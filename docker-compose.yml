services:
  mcp-key-service:
    build: .
    container_name: mcp-key-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"  # Localhost only — not exposed to the network
    environment:
      - PORT=8090
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - KEY_ENCRYPTION_SECRET=${KEY_ENCRYPTION_SECRET}
      - INTERNAL_SERVER_TOKENS=${INTERNAL_SERVER_TOKENS}
      - DATA_DIR=/app/data
      - TRUST_PROXY=${TRUST_PROXY:-0}
      - FIREBASE_ADMIN_PROJECT_ID=${FIREBASE_ADMIN_PROJECT_ID}
      - FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
      - FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
      - ADMIN_UIDS=${ADMIN_UIDS}
    volumes:
      - key-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

  mcp-key-portal:
    build: ./portal
    container_name: mcp-key-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_ADMIN_PROJECT_ID=${FIREBASE_ADMIN_PROJECT_ID}
      - FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
      - FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
      - KEY_SERVICE_URL=http://mcp-key-service:8090
      - KEY_SERVICE_ADMIN_KEY=${ADMIN_API_KEY}
      - ADMIN_UIDS=${ADMIN_UIDS}
    networks:
      - mcp-network
    depends_on:
      - mcp-key-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  key-data:

networks:
  mcp-network:
    external: true
