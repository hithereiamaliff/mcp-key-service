name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/opt/mcp-key-service"

            # Clone or pull latest code
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/hithereiamaliff/mcp-key-service.git "$DEPLOY_DIR"
            else
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"

            # Ensure .env exists (secrets are set up once manually on the VPS)
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found at $DEPLOY_DIR/.env"
              echo "Create it manually first with the required secrets."
              exit 1
            fi

            # Ensure Docker network exists
            docker network inspect mcp-network >/dev/null 2>&1 || \
              docker network create mcp-network

            # Build and deploy
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:8090/health > /dev/null 2>&1; then
                echo "Health check passed!"
                docker compose ps
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed after 30 seconds"
            docker compose logs --tail=30
            exit 1
